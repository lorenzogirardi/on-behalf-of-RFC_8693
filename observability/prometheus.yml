global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: obo-exchange
    static_configs:
      - targets: ["obo-exchange:8081"]

  - job_name: agent
    static_configs:
      - targets: ["agent:8082"]

  - job_name: mcp-mock
    static_configs:
      - targets: ["mcp-mock:8083"]

  - job_name: webapp
    static_configs:
      - targets: ["webapp:8080"]

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:8080"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
