{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  labels:
    {{- include "poc.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.litellm.config | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    {{- include "poc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.litellm.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        {{- include "poc.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.litellm.config | sha256sum }}
    spec:
      containers:
        - name: litellm
          image: {{ .Values.litellm.image }}
          args: ["--config", "/app/config.yaml", "--port", {{ .Values.litellm.port | quote }}]
          ports:
            - name: http
              containerPort: {{ .Values.litellm.port }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef: {name: {{ include "poc.secretName" . }}, key: OPENAI_API_KEY, optional: true}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: {name: {{ include "poc.secretName" . }}, key: ANTHROPIC_API_KEY, optional: true}
            {{- if .Values.litellm.ollamaApiBase }}
            - name: OLLAMA_API_BASE
              value: {{ .Values.litellm.ollamaApiBase | quote }}
            {{- end }}
          livenessProbe:
            httpGet: {path: /health/liveliness, port: http}
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /health/liveliness, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    {{- include "poc.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - name: http
      port: {{ .Values.litellm.port }}
      targetPort: http
{{- end }}
