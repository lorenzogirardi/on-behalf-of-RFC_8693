{{- if .Values.keycloak.enabled }}
# In-cluster Keycloak for self-contained demos (start-dev, ephemeral H2 DB).
# NOT a production Keycloak: no persistence, no TLS, admin password in values.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    {{- include "poc.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        {{- include "poc.labels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args: ["start-dev"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_FEATURES
              value: "token-exchange,admin-fine-grained-authz"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    {{- include "poc.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
