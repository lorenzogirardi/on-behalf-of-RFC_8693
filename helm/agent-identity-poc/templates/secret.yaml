{{- if .Values.secrets.create }}
# DEMO ONLY — in real environments set secrets.create=false and manage the
# Secret with External Secrets Operator / Sealed Secrets / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: poc-secrets
  labels:
    {{- include "poc.labels" . | nindent 4 }}
type: Opaque
stringData:
  EXCHANGE_APP_CLIENT_SECRET: {{ .Values.secrets.exchangeAppClientSecret | quote }}
  AGENT_CLIENT_SECRET: {{ .Values.secrets.agentClientSecret | quote }}
  AGENT_STATE_AEAD_KEY: {{ .Values.secrets.agentStateAeadKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
{{- end }}
